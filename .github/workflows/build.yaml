name: Desktop Multi OS Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"

      - name: Build Windows binary (flagged)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist\windows | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "-s -w -H=windowsgui" -o .\dist\windows\JhopanStoreVPN.exe .

      - name: Download Xray for Windows
        shell: pwsh
        run: |
          # Get latest Xray-core release
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/XTLS/Xray-core/releases/latest" -Headers @{"Accept"="application/vnd.github.v3+json"}
          $asset = $release.assets | Where-Object { $_.name -like "*windows*64*" -and $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find Xray Windows binary in latest release" }
          $download_url = $asset.browser_download_url
          Write-Host "Downloading Xray from: $download_url"
          
          # Download and extract
          $zip_path = ".\xray.zip"
          Invoke-WebRequest -Uri $download_url -OutFile $zip_path
          Expand-Archive -Path $zip_path -DestinationPath .\dist\windows\ -Force
          Remove-Item $zip_path
          
          # Rename xray.exe to match if needed
          if (Test-Path .\dist\windows\xray.exe) { Write-Host "✓ Xray.exe downloaded successfully" }
          else { throw "xray.exe not found after extraction" }

      - name: Copy Windows runtime files (wintun.dll)
        shell: pwsh
        run: |
          if (Test-Path .\assets) {
            New-Item -ItemType Directory -Force -Path .\dist\windows\assets | Out-Null
            Copy-Item .\assets\* .\dist\windows\assets\ -Recurse -Force
          }
          if (Test-Path .\wintun.dll) { Copy-Item .\wintun.dll .\dist\windows\ -Force }
          if (Test-Path .\dist\windows\JhopanStoreVPN.exe) { Write-Host "✓ JhopanStoreVPN.exe built successfully" }
          else { throw "Missing dist/windows/JhopanStoreVPN.exe" }
          Write-Host "✓ Windows dist ready for packaging"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: ./packaging/windows/make-installer.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-windows
          path: |
            dist/windows/JhopanStoreVPN.exe
            dist/windows/xray.exe
            dist/windows/wintun.dll
            dist/installer/windows/JhopanStoreVPN-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"

      - name: Set build version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Install Linux build dependencies (Fyne/X11/OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            pkg-config \
            xorg-dev \
            unzip \
            rpm

      - name: Remove Windows-only resource object
        run: rm -f ./resource.syso

      - name: Build Linux binary
        run: |
          mkdir -p ./dist/linux
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ./dist/linux/JhopanStoreVPN .

      - name: Download Xray for Linux
        run: |
          # Get latest Xray-core release
          release=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest)
          download_url=$(echo "$release" | grep -Eo '"browser_download_url": "[^"]*linux-64(\.zip|\.tar\.gz)"' | head -1 | cut -d'"' -f4)
          if [ -z "$download_url" ]; then
            echo "Could not find Xray Linux binary in latest release"
            exit 1
          fi
          echo "Downloading Xray from: $download_url"
          
          # Download and extract
          cd dist/linux
          archive_name="${download_url##*/}"
          curl -L "$download_url" -o "$archive_name"
          case "$archive_name" in
            *.zip)
              unzip -o "$archive_name"
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "$archive_name"
              ;;
            *)
              echo "Unsupported archive format: $archive_name"
              exit 1
              ;;
          esac
          rm "$archive_name"
          chmod +x xray
          if [ -f xray ]; then
            echo "✓ Xray downloaded successfully"
          else
            echo "xray not found after extraction"
            exit 1
          fi

      - name: Copy Linux assets
        run: |
          mkdir -p ./dist/linux/assets
          cp -R ./assets/. ./dist/linux/assets/

      - name: Build Linux package (.deb)
        run: |
          chmod +x ./packaging/linux/build-deb.sh
          ./packaging/linux/build-deb.sh "$APP_VERSION" amd64

      - name: Build Linux package (.rpm)
        run: |
          chmod +x ./packaging/linux/build-rpm.sh
          ./packaging/linux/build-rpm.sh "$APP_VERSION" amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-linux
          path: |
            dist/linux/JhopanStoreVPN
            dist/linux/xray
            dist/installer/linux/*.deb
            dist/installer/linux/*.rpm

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"

      - name: Set build version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Remove Windows-only resource object
        run: rm -f ./resource.syso

      - name: Build macOS binaries (arm64 + amd64)
        run: |
          mkdir -p ./dist/installer/macos
          for arch in arm64 amd64; do
            if [ "$arch" = "arm64" ]; then
              token="macos-arm64"
            else
              token="macos-64"
            fi

            rm -rf ./dist/macos
            mkdir -p ./dist/macos

            CGO_ENABLED=1 GOOS=darwin GOARCH=$arch go build -trimpath -ldflags "-s -w" -o ./dist/macos/JhopanStoreVPN .

            TARGET_TOKEN="$token" download_url=$(python3 - <<'PY'
import json
import os
import urllib.request

api = "https://api.github.com/repos/XTLS/Xray-core/releases/latest"
with urllib.request.urlopen(api) as r:
    data = json.load(r)

target = os.environ.get("TARGET_TOKEN", "macos-arm64")
urls = [a.get("browser_download_url", "") for a in data.get("assets", [])]
urls = [u for u in urls if "macos" in u and not u.endswith(".dgst")]

def pick(candidates, needle):
    for u in candidates:
        if needle in u and (u.endswith(".zip") or u.endswith(".tar.gz") or u.endswith(".tgz")):
            return u
    return ""

chosen = pick(urls, target)
if not chosen and target != "macos-arm64":
    chosen = pick(urls, "macos-arm64")
if not chosen and target != "macos-64":
    chosen = pick(urls, "macos-64")
if not chosen and urls:
    chosen = urls[0]

print(chosen)
PY
)

            if [ -z "$download_url" ]; then
              echo "Could not find Xray macOS binary in latest release for $arch"
              exit 1
            fi

            archive_name="${download_url##*/}"
            curl -L "$download_url" -o "./dist/macos/$archive_name"
            cd ./dist/macos
            case "$archive_name" in
              *.zip)
                unzip -o "$archive_name"
                ;;
              *.tar.gz|*.tgz)
                tar -xzf "$archive_name"
                ;;
              *)
                echo "Unsupported archive format: $archive_name"
                exit 1
                ;;
            esac
            rm "$archive_name"
            chmod +x xray
            cd ../../

            mkdir -p ./dist/macos/assets
            cp -R ./assets/. ./dist/macos/assets/

            chmod +x ./packaging/macos/build-dmg.sh
            ./packaging/macos/build-dmg.sh "$APP_VERSION" "$arch"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-macos
          path: |
            dist/installer/macos/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/JhopanStoreVPN-windows/installer/windows/JhopanStoreVPN-Setup.exe
            release-artifacts/JhopanStoreVPN-linux/installer/linux/jhopanstorevpn_*.deb
            release-artifacts/JhopanStoreVPN-linux/installer/linux/jhopanstorevpn_*.rpm
            release-artifacts/JhopanStoreVPN-macos/installer/macos/JhopanStoreVPN-*-amd64.dmg
            release-artifacts/JhopanStoreVPN-macos/installer/macos/JhopanStoreVPN-*-arm64.dmg
